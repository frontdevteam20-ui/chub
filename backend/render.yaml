services:
  - type: web
    name: analytics-api
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GA_PROPERTY_ID
        sync: false
      - key: GA_SERVICE_ACCOUNT
        sync: false
